{% extends 'base.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monteaki</title>

    <!-- Bootstrap CSS-->
    <link rel="icon" type="image/png" href="{% static 'resources/Mini_Logo.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="content-overlay">
        <div class="container mt-5">

            <h2 class="text-center mb-4">Produtos</h2>

            <div class="row g-4">
                {% for produto in produtos %}
                <div class="col-12 col-sm-6 col-md-4 col-lg-3">
                    <div class="card h-100 text-center position-relative">
                        <div class="position-absolute top-0 end-0 p-2">
                            <button class="btn btn-light rounded-circle shadow-sm"
                                onclick="toggleFavorito(this, '{{ produto.nome_produto }}')">
                                <i class="bi bi-heart text-danger"></i>
                            </button>
                        </div>

                        <img src="{{ produto.foto_produto.url }}" class="card-img-top" alt="{{ produto.nome_produto }}">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">{{ produto.nome_produto }}</h5>
                            <p class="preco fw-bold" style="color: #6a0dad;">R$ {{ produto.valor }}</p>

                            <button class="btn btn-success mt-auto w-100"
                                onclick="adicionarAoCarrinho('{{ produto.nome_produto }}', '{{ produto.valor }}', '{{ produto.foto_produto.url }}')">
                                <i class="bi bi-cart-plus"></i> Comprar
                            </button>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>

        </div>

    </div>
    <!-- Bootstrap JS Bundle (Popper + Bootstrap) -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function adicionarAoCarrinho(nome, preco, foto) {
            fetch("{% url 'adicionar_ao_carrinho' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}"
                },
                body: JSON.stringify({
                    nome: nome,
                    preco: preco,
                    foto: foto
                })
            })
                .then(response => {
                    if (response.ok) {
                        alert(nome + " adicionado ao carrinho!");
                    }
                });
        }

        function toggleFavorito(btn, nome) {
            const icon = btn.querySelector('i');
            icon.classList.toggle('bi-heart');
            icon.classList.toggle('bi-heart-fill');
        }
    </script>

</body>

</html>
{% endblock %}
