{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monteaki</title>

    <!-- Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="top-bar">
        <div class="logo">
            <a href="{% url 'home' %}" class="logo-link">
                <img src="{% static 'resources/Mini_Logo.png' %}">
                <span class="logo-text">MONTE <strong>AKI</strong></span>
            </a>
        </div>
        <nav>
            <ul>
                <li><button>Montagem</button></li>
                <li><button>PC Gamer</button></li>
                <li><button>Escritório</button></li>
                <li><button><a href="{% url 'hardware' %}">Hardware</a></button></li>
                <li><button>Periféricos</button></li>
                <li><button>Frete Grátis</button></li>
            </ul>
        </nav>
        <div>
            <a href="{% url 'login' %}"><img src="{% static 'resources/icone-usuario.png' %}"></a>
            <a href="{% url 'login' %}"><img src="{% static 'resources/icone-carrinho.png' %}"></a>
        </div>
    </div>
    <div class="content-overlay">
        <div class="container mt-5">

    <h2 class="text-center mb-4">Produtos</h2>

    <div class="row g-4">
        {% for produto in produtos %}
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <div class="card h-100 text-center">
                <img src="{{ produto.foto_produto.url }}" class="card-img-top" alt="">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ produto.nome_produto }}</h5>  
                    <p class="card-text text-muted">{{ produto.descricao|truncatechars:80 }}</p>
                    <p class="preco">R$ {{ produto.valor }}</p>
                    <button class="btn btn-success mt-auto">Comprar</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

    </div>
    <!-- Bootstrap JS Bundle (Popper + Bootstrap) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
