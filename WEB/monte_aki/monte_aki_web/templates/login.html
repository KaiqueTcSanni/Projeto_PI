{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  .content-overlay {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 40px 20px;
    background-color: #f4f4f9;
  }

  .login-card {
    max-width: 600px;
    width: 100%;
    background: #fff;
    padding: 50px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    text-align: center;
  }

  .login-card h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #333;
    margin-bottom: 10px;
    letter-spacing: -1px;
  }

  .login-card p.subtitle {
    color: #777;
    margin-bottom: 35px;
    font-size: 1rem;
  }

  .alert-box {
    background: #fff5f5;
    border: 1px solid #ffcccc;
    border-left: 5px solid #ff4d4d;
    color: #d63031;
    padding: 15px;
    margin-bottom: 25px;
    border-radius: 8px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .form-group {
    margin-bottom: 20px;
    text-align: left;
  }

  .form-group label {
    display: block;
    font-weight: bold;
    margin-bottom: 8px;
    color: #555;
    font-size: 0.9rem;
  }

  .form-group input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid #eee;
    border-radius: 10px;
    font-size: 1rem;
    transition: 0.3s;
    box-sizing: border-box;
  }

  .form-group input:focus {
    outline: none;
    border-color: #6200ea;
    background-color: #fdfbff;
  }

  /* Botão estilo Monte Aki */
  .btn-entrar {
    background: #6200ea;
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 30px;
    font-weight: bold;
    font-size: 1.1rem;
    width: 100%;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 15px;
    text-transform: uppercase;
    box-shadow: 0 4px 15px rgba(98, 0, 234, 0.3);
  }

  .btn-entrar:hover {
    background: #4b00b4;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(98, 0, 234, 0.4);
  }

  .footer-link {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #eee;
    font-size: 0.95rem;
    color: #666;
  }

  .footer-link a {
    color: #6200ea;
    text-decoration: none;
    font-weight: bold;
  }
</style>

<main class="content-overlay">
  <div class="login-card">
    <h1>BEM-VINDO DE VOLTA</h1>
    <p class="subtitle">Acesse sua conta para continuar montando seu PC</p>
    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label>NOME DE USUÁRIO</label>
        <input type="text" name="username" placeholder="Digite seu usuário" required>
      </div>

      <div class="form-group">
        <label>SUA SENHA</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-entrar">ACESSAR CONTA</button>

      <div class="footer-link">
        Ainda não tem conta? <a href="{% url 'cadastro' %}">Crie uma agora</a>
      </div>
    </form>
  </div>
</main>
{% endblock %}
