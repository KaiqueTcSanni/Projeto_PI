{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
  .content-overlay {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
    padding: 40px 20px;
    background-color: #f4f4f9;
  }

  .cadastro-card {
    max-width: 800px;
    width: 100%;
    background: #fff;
    padding: 50px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    text-align: center;
  }

  .cadastro-card h1 {
    font-size: 2.2rem;
    font-weight: 800;
    color: #333;
    margin-bottom: 10px;
    letter-spacing: -1px;
  }

  .cadastro-card p.subtitle {
    color: #777;
    margin-bottom: 35px;
    font-size: 1rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    text-align: left;
  }

  .form-group {
    margin-bottom: 5px;
  }

  .form-group label {
    display: block;
    font-weight: bold;
    margin-bottom: 8px;
    color: #555;
    font-size: 0.85rem;
  }

  .form-group input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid #eee;
    border-radius: 10px;
    font-size: 1rem;
    transition: 0.3s;
    box-sizing: border-box;
  }

  .form-group input:focus {
    outline: none;
    border-color: #6200ea;
    background-color: #fdfbff;
  }

  .info-text {
    grid-column: span 2;
    text-align: left;
    font-size: 0.8rem;
    color: #999;
    margin-top: -10px;
  }

  .checkbox-group {
    grid-column: span 2;
    text-align: left;
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .checkbox-group label {
    font-size: 0.9rem;
    color: #666;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
  }

  .checkbox-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #6200ea;
  }

  .btn-cadastrar {
    grid-column: span 2;
    background: #6200ea;
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 30px;
    font-weight: bold;
    font-size: 1.1rem;
    width: 100%;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 20px;
    text-transform: uppercase;
    box-shadow: 0 4px 15px rgba(98, 0, 234, 0.3);
  }

  .btn-cadastrar:hover {
    background: #4b00b4;
    transform: translateY(-2px);
  }

  .footer-link {
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #eee;
    font-size: 0.95rem;
    color: #666;
  }

  .footer-link a {
    color: #6200ea;
    text-decoration: none;
    font-weight: bold;
  }

  @media (max-width: 600px) {
    .form-grid {
      grid-template-columns: 1fr;
    }

    .info-text,
    .checkbox-group,
    .btn-cadastrar {
      grid-column: span 1;
    }
  }
</style>

<main class="content-overlay">
  <div class="cadastro-card">
    <h1>CRIAR CONTA</h1>
    <p class="subtitle">Junte-se à Monte Aki e comece a montar o PC dos seus sonhos</p>

    <form class="formulario" method="post">
      {% csrf_token %}

      <div class="form-grid">
        <div class="form-group">
          <label>NOME DE USUÁRIO *</label>
          <input type="text" name="username" placeholder="Como quer ser chamado" required>
        </div>

        <div class="form-group">
          <label>CPF</label>
          <input type="text" placeholder="000.000.000-00">
        </div>

        <div class="form-group">
          <label>TELEFONE CELULAR</label>
          <input type="tel" placeholder="(00) 00000-0000">
        </div>

        <div class="form-group">
          <label>E-MAIL *</label>
          <input type="email" name="email" placeholder="seu@email.com" required>
        </div>

        <div class="form-group">
          <label>CRIE SUA SENHA *</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
          <label>CONFIRME SUA SENHA *</label>
          <input type="password" placeholder="••••••••" required>
        </div>

        <div class="info-text">
          (*) Campos obrigatórios
        </div>

        <div class="checkbox-group">
          <label>
            <input type="checkbox">
            Quero receber ofertas e novidades por e-mail, SMS ou WhatsApp.
          </label>
          <label>
            <input type="checkbox" required>
            Li e estou de acordo com as <a href="#">políticas de privacidade</a>.
          </label>
        </div>

        <button type="submit" class="btn-cadastrar">FINALIZAR CADASTRO</button>
      </div>

      <div class="footer-link">
        Já possui cadastro? <a href="{% url 'login' %}">ENTRE NA SUA CONTA</a>
      </div>
    </form>
  </div>
</main>

<script>
  function mascaraData(val) {
    var pass = val.value;
    var expr = /[0123456789]/;

    for (i = 0; i < pass.length; i++) {
      var lchar = val.value.charAt(i);
      var nchar = val.value.charAt(i + 1);


      if (i == 0) {
        if ((lchar.search(expr) != 0) || (lchar > 3)) {
          val.value = "";
        }
      } else if (i == 1) {

        if (lchar.search(expr) != 0) {
          var tst1 = val.value.substring(0, (i));
          val.value = tst1;
          continue;
        }



        if ((nchar != '/') && (nchar != '')) {
          var tst1 = val.value.substring(0, (i) + 1);
          if (nchar.search(expr) != 0)
            var tst2 = val.value.substring(i + 2, pass.length);
          else
            var tst2 = val.value.substring(i + 1, pass.length);
          val.value = tst1 + '/' + tst2;

        }

      } else if (i == 4) {
        if (lchar.search(expr) != 0) {
          var tst1 = val.value.substring(0, (i));
          val.value = tst1;
          continue;
        }

        if ((nchar != '/') && (nchar != '')) {
          var tst1 = val.value.substring(0, (i) + 1);
          if (nchar.search(expr) != 0)
            var tst2 = val.value.substring(i + 2, pass.length);
          else
            var tst2 = val.value.substring(i + 1, pass.length);
          val.value = tst1 + '/' + tst2;
        }
      }

      if (i >= 6) {
        if (lchar.search(expr) != 0) {
          var tst1 = val.value.substring(0, (i));
          val.value = tst1;
        }
      }
    }

    if (pass.length > 10)
      val.value = val.value.substring(0, 10);
    return true;
  }
</script>
{% endblock %}
