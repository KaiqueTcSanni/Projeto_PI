{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
  .content-overlay {
    padding-top: 60px;
    padding-bottom: 60px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 84vh;
  }

  .main-cadastro {
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    padding: 30px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  }
</style>

<body>

  <div class="content-overlay">
    <div class="main-cadastro">
      <h1>CRIAR CONTA</h1>

      <form class="formulario" method="post">
        {% csrf_token %}
        <div class="form-row">
          <input type="text" name="username" placeholder="Nome Usuário *" required>
          <input type="text" placeholder="CPF">
        </div>
        <div class="form-row">
          <input type="tel" placeholder="Telefone celular">
          <input type="email" name="email" placeholder="Email *" required>
        </div>
        <div class="form-row">
          <input type="password" name="password" placeholder="Crie sua senha *" required>
          <input type="password" placeholder="Confirme sua senha *">
        </div>
        <div class="info-text">
          <p>(*) Campos obrigatórios</p>
        </div>
        <div class="checkbox-group">
          <label><input type="checkbox"> Quero receber ofertas e novidades por e-mail, SMS, WhatsApp ou
            mensagens</label>
          <label><input type="checkbox" required> Li e estou de acordo com as <a href="#">políticas da empresa e
              políticas de privacidade.</a></label>
        </div>
        <button type="submit">CADASTRAR</button>
        <p class="login-link">Já possui cadastro? <a href="{% url 'login' %}">ENTRE</a></p>
      </form>
    </div>
  </div>
</body>
<script>

  function mascaraData(val) {
    var pass = val.value;
    var expr = /[0123456789]/;

    for (i = 0; i < pass.length; i++) {
      // charAt -> retorna o caractere posicionado no índice especificado
      var lchar = val.value.charAt(i);
      var nchar = val.value.charAt(i + 1);

      if (i == 0) {
        // search -> retorna um valor inteiro, indicando a posição do inicio da primeira
        // ocorrência de expReg dentro de instStr. Se nenhuma ocorrencia for encontrada o método retornara -1
        // instStr.search(expReg);
        if ((lchar.search(expr) != 0) || (lchar > 3)) {
          val.value = "";
        }

      } else if (i == 1) {

        if (lchar.search(expr) != 0) {
          // substring(indice1,indice2)
          // indice1, indice2 -> será usado para delimitar a string
          var tst1 = val.value.substring(0, (i));
          val.value = tst1;
          continue;
        }

        if ((nchar != '/') && (nchar != '')) {
          var tst1 = val.value.substring(0, (i) + 1);

          if (nchar.search(expr) != 0)
            var tst2 = val.value.substring(i + 2, pass.length);
          else
            var tst2 = val.value.substring(i + 1, pass.length);

          val.value = tst1 + '/' + tst2;
        }

      } else if (i == 4) {

        if (lchar.search(expr) != 0) {
          var tst1 = val.value.substring(0, (i));
          val.value = tst1;
          continue;
        }

        if ((nchar != '/') && (nchar != '')) {
          var tst1 = val.value.substring(0, (i) + 1);

          if (nchar.search(expr) != 0)
            var tst2 = val.value.substring(i + 2, pass.length);
          else
            var tst2 = val.value.substring(i + 1, pass.length);

          val.value = tst1 + '/' + tst2;
        }
      }

      if (i >= 6) {
        if (lchar.search(expr) != 0) {
          var tst1 = val.value.substring(0, (i));
          val.value = tst1;
        }
      }
    }

    if (pass.length > 10)
      val.value = val.value.substring(0, 10);
    return true;
  }

</script>

</html>

{% endblock %}
