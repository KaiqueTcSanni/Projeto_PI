{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 pt-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'home' %}" class="text-decoration-none">Home</a></li>
            <li class="breadcrumb-item active">{{ produto.tipo_produto }}</li>
        </ol>
    </nav>

    <div class="row bg-white p-4 shadow-sm rounded-4">
        <div class="col-md-6 text-center border-end">
            <img src="{{ produto.foto_produto.url }}" class="img-fluid p-4"
                style="max-height: 450px; object-fit: contain;">
        </div>

        <div class="col-md-6 ps-md-5">
            <small class="text-muted">Fornecedor: <strong>{{ produto.fornecedor }}</strong></small>
            <h2 class="fw-bold mt-2">{{ produto.nome_produto }}</h2>

            <div class="my-4 p-3 bg-light rounded-3">
                <h6 class="text-muted mb-1 text-decoration-line-through">R$ {{ produto.valor|add:"150" }}</h6>
                <h1 class="fw-bold" style="color: #6a0dad;">R$ {{ produto.valor }}</h1>
                <p class="text-success small mb-0"><i class="bi bi-check-circle"></i> Em estoque</p>
            </div>

            <div class="d-grid gap-2">
                <button type="button" onclick="adicionarAoCarrinho('{{ produto.id_produto }}')"
                    class="btn btn-primary btn-lg rounded-pill border-0 py-3" style="background-color: #6a0dad;">
                    <i class="bi bi-cart-plus me-2"></i> ADICIONAR AO CARRINHO
                </button>
            </div>

            <div class="mt-4">
                <h5 class="fw-bold border-bottom pb-2">Descrição do Produto</h5>
                <p class="text-muted" style="line-height: 1.6;">{{ produto.descricao }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
